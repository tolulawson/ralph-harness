model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "danger-full-access"

[features]
multi_agent = true

[agents]
max_threads = 4
max_depth = 2

[agents.orchestrator]
config_file = "agents/orchestrator.toml"

[agents.prd]
config_file = "agents/prd.toml"

[agents.specify]
config_file = "agents/specify.toml"

[agents.research]
config_file = "agents/research.toml"

[agents.plan]
config_file = "agents/plan.toml"

[agents.task_gen]
config_file = "agents/task-gen.toml"

[agents.plan_check]
config_file = "agents/plan-check.toml"

[agents.bootstrap]
config_file = "agents/bootstrap.toml"

[agents.implement]
config_file = "agents/implement.toml"

[agents.review]
config_file = "agents/review.toml"

[agents.verify]
config_file = "agents/verify.toml"

[agents.release]
config_file = "agents/release.toml"
