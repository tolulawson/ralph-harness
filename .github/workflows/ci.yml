name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Make scripts executable
        run: chmod +x scripts/verify-installation-contract.sh scripts/verify-atomic-commit-contract.sh scripts/verify-human-stop-boundaries.sh scripts/verify-interruption-contract.sh scripts/verify-parallel-research-contract.sh scripts/verify-subagent-isolation-contract.sh scripts/verify-upgrade-contract.sh scripts/validate-harness.sh scripts/smoke-test-install-upgrade.sh scripts/render-release-notes.sh

      - name: Validate harness contracts
        run: scripts/validate-harness.sh
